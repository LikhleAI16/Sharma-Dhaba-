<!DOCTYPE html>
<html>
<head>
  <title>Sharma Dhaba AR Menu</title>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>

  <!-- STABLE VERSION — Works perfectly on Android Chrome -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.0/aframe/build/aframe-ar.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
    }

    #instructions {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.65);
      color: white;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 14px;
      z-index: 9999;
      text-align: center;
      white-space: nowrap;
    }

    #dish-card {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.80);
      color: white;
      padding: 18px 30px;
      border-radius: 20px;
      text-align: center;
      display: none;
      z-index: 9999;
      min-width: 280px;
      max-width: 90%;
    }

    #dish-card h2 {
      margin: 0 0 8px 0;
      font-size: 22px;
      color: #FFD700;
    }

    #dish-card p {
      margin: 5px 0;
      font-size: 15px;
      color: #ffffff;
    }

    #restaurant-name {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 165, 0, 0.85);
      color: white;
      padding: 6px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: bold;
      z-index: 9999;
      white-space: nowrap;
    }
  </style>
</head>

<body>

  <div id="instructions">📷 Point camera at marker on menu card</div>
  <div id="restaurant-name">🍽️ Sharma Dhaba</div>

  <div id="dish-card">
    <h2 id="dish-name"></h2>
    <p id="dish-price"></p>
    <p id="dish-ingredients"></p>
    <p id="dish-description"></p>
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; alpha: true"
    arjs="sourceType: webcam;
          debugUIEnabled: false;
          detectionMode: mono_and_matrix;
          matrixCodeType: 3x3;">

    <!-- DISH 1 — Hiro Marker -->
    <a-marker preset="hiro" id="marker-hiro">
      <a-image
        src="biriyani.jpg.jpg"
        position="0 0.1 0"
        rotation="-90 0 0"
        width="1.5"
        height="1.5">
      </a-image>
      <a-text
        value="Chicken Biryani"
        position="0 0.1 1.0"
        rotation="-90 0 0"
        align="center"
        color="#FFD700"
        width="3.5">
      </a-text>
    </a-marker>

    <!-- DISH 2 — Kanji Marker -->
    <a-marker preset="kanji" id="marker-kanji">
      <a-image
        src="paneer.jpg.jpg"
        position="0 0.1 0"
        rotation="-90 0 0"
        width="1.5"
        height="1.5">
      </a-image>
      <a-text
        value="Paneer Masala"
        position="0 0.1 1.0"
        rotation="-90 0 0"
        align="center"
        color="#FFD700"
        width="3.5">
      </a-text>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    fetch('menu.json')
      .then(function(response) {
        return response.json();
      })
      .then(function(menuData) {

        document.getElementById('marker-hiro')
          .addEventListener('markerFound', function() {
            showDishCard(menuData.dishes[0]);
          });

        document.getElementById('marker-kanji')
          .addEventListener('markerFound', function() {
            showDishCard(menuData.dishes[1]);
          });

        document.getElementById('marker-hiro')
          .addEventListener('markerLost', hideDishCard);

        document.getElementById('marker-kanji')
          .addEventListener('markerLost', hideDishCard);
      })
      .catch(function(error) {
        console.log('Menu load error:', error);
      });

    function showDishCard(dish) {
      document.getElementById('dish-card').style.display = 'block';
      document.getElementById('dish-name').textContent = dish.name;
      document.getElementById('dish-price').textContent = '💰 Price: ' + dish.price;
      document.getElementById('dish-ingredients').textContent = '🥘 ' + dish.ingredients;
      document.getElementById('dish-description').textContent = '📝 ' + dish.description;
      document.getElementById('instructions').style.display = 'none';
    }

    function hideDishCard() {
      document.getElementById('dish-card').style.display = 'none';
      document.getElementById('instructions').style.display = 'block';
    }
  </script>

</body>
</html>
